<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Portfólio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/entrada.css" />
</head>
<body>

  <!-- CENA DE FUNDO: teia de aranha geométrica -->
  <div id="cena-cidade">
    <svg class="teia__svg" viewBox="0 0 600 460" preserveAspectRatio="xMidYMid slice">
      <!-- linhas radiais saindo do centro (os "fios" da teia) -->
      <g id="teia-raios" stroke="#ff0080" stroke-width="0.6" opacity="0.45" fill="none">
        <line x1="300" y1="230" x2="300" y2="-60"/>
        <line x1="300" y1="230" x2="520" y2="20"/>
        <line x1="300" y1="230" x2="660" y2="230"/>
        <line x1="300" y1="230" x2="520" y2="440"/>
        <line x1="300" y1="230" x2="300" y2="520"/>
        <line x1="300" y1="230" x2="80"  y2="440"/>
        <line x1="300" y1="230" x2="-60" y2="230"/>
        <line x1="300" y1="230" x2="80"  y2="20"/>
      </g>

      <!-- anéis hexagonais concêntricos (giram devagar) -->
      <g id="teia-aneis" stroke="#00e5ff" stroke-width="0.6" opacity="0.4" fill="none">
        <polygon points="300,150 390,190 390,270 300,310 210,270 210,190"/>
        <polygon points="300,90 450,160 450,300 300,370 150,300 150,160"/>
        <polygon points="300,30 510,130 510,330 300,430 90,330 90,130"/>
        <polygon points="300,-40 580,90 580,370 300,500 20,370 20,90"/>
      </g>
    </svg>

    <div class="cidade__titulo">
      <p class="cidade__tag" data-txt="PORTFÓLIO">PORTFÓLIO</p>
      <h1 class="cidade__nome" data-txt="LUCAS ZICA">LUCAS ZICA</h1>
    </div>

    <button id="btn-entrar" data-txt="ENTRAR">ENTRAR</button>
  </div>

  <!-- PORTAL -->
  <div id="portal">
    <svg viewBox="0 0 200 200">
      <defs>
        <!-- núcleo brilhante: branco no centro até transparente nas bordas -->
        <radialGradient id="nucleo" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#ffffff"/>
          <stop offset="35%"  stop-color="#ffe600"/>
          <stop offset="70%"  stop-color="#ff7b2d"/>
          <stop offset="100%" stop-color="#ff2d6f" stop-opacity="0"/>
        </radialGradient>
        <!-- brilho suave nas bordas (glow) -->
        <filter id="brilho" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="1.6" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- raios de luz saindo do centro -->
      <g id="portal-raios">
        <g stroke="#ffd24d" stroke-width="1" opacity="0.4">
          <line x1="100" y1="100" x2="100" y2="0"/>
          <line x1="100" y1="100" x2="170" y2="30"/>
          <line x1="100" y1="100" x2="200" y2="100"/>
          <line x1="100" y1="100" x2="170" y2="170"/>
          <line x1="100" y1="100" x2="100" y2="200"/>
          <line x1="100" y1="100" x2="30"  y2="170"/>
          <line x1="100" y1="100" x2="0"   y2="100"/>
          <line x1="100" y1="100" x2="30"  y2="30"/>
        </g>
      </g>

      <!-- anéis hexagonais principais (quentes), com brilho -->
      <g id="portal-aneis" filter="url(#brilho)">
        <polygon points="100,18 171,59 171,141 100,182 29,141 29,59" fill="none" stroke="#ff2d6f" stroke-width="5"/>
        <polygon points="100,30 161,65 161,135 100,170 39,135 39,65" fill="none" stroke="#ff5a3c" stroke-width="4.5"/>
        <polygon points="100,44 149,72 149,128 100,156 51,128 51,72" fill="none" stroke="#ff7b2d" stroke-width="4"/>
        <polygon points="100,58 137,79 137,121 100,142 63,121 63,79" fill="none" stroke="#ffb02d" stroke-width="3.5"/>
        <polygon points="100,72 124,86 124,114 100,128 76,114 76,86" fill="none" stroke="#ffe600" stroke-width="3"/>
      </g>

      <!-- anéis finos magenta/ciano que giram ao contrário -->
      <g id="portal-aneis2" opacity="0.5">
        <polygon points="100,24 166,62 166,138 100,176 34,138 34,62" fill="none" stroke="#ff0080" stroke-width="2"/>
        <polygon points="100,51 143,76 143,124 100,149 57,124 57,76" fill="none" stroke="#00e5ff" stroke-width="1.5"/>
      </g>

      <!-- núcleo pulsante -->
      <circle id="portal-nucleo" cx="100" cy="100" r="34" fill="url(#nucleo)"/>

      <!-- estilhaços de realidade flutuando -->
      <g fill="#ff7b2d" opacity="0.8">
        <polygon points="40,40 50,44 44,52"/>
        <polygon points="160,50 168,56 159,60"/>
        <polygon points="150,150 158,154 149,159"/>
        <polygon points="48,156 56,151 58,160"/>
      </g>
    </svg>
  </div>

  <script src="js/entrada.js"></script>
</body>
</html>
